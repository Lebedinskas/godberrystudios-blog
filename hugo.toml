baseURL = "https://godberrystudios.com/"
languageCode = "en-us"
title = "Godberry Studios | Web Scraping & Automation Tools"
theme = ""
paginate = 10

[params]
  description = "Build smarter workflows with powerful web scraping and content automation tools. Tutorials, guides, and tools by Godberry Studios."
  author = "Godberry Studios"
  tagline = "Web Scraping & Content Automation"

[markup]
  [markup.highlight]
    style = "monokai"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[[menu.main]]
  name = "Blog"
  url = "/posts/"
  weight = 1

[[menu.main]]
  name = "Tools"
  url = "/tools/"
  weight = 2

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 3
