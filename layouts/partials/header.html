<header class="site-header">
  <div class="container">
    <a href="/" class="logo">
      <img src="/images/logo.svg" alt="Godberry Studios" class="logo-img">
      <span class="logo-text">Godberry Studios</span>
    </a>
    <nav class="main-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </nav>
    <button class="search-toggle" aria-label="Search" title="Search articles">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="mobile-menu-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- Search overlay -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-container">
    <div class="search-input-wrap">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search articles..." autocomplete="off" autofocus>
      <kbd class="search-kbd">ESC</kbd>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>
